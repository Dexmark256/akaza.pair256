<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AKAZA-MD | Session Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #07181f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* animated background particles */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at 20% 50%, rgba(0,255,204,0.05) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(58,134,255,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(135deg, #00ffc3, #3a86ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      animation: fadeDown 1s ease forwards;
    }

    .tagline {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 30px;
      animation: fadeDown 1.2s ease forwards;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeUp 1.4s ease forwards;
    }

    .btn {
      width: 220px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 12px;
      border: none;
      color: white;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: 1px;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,255,204,0.2);
      border-color: #00ffc3;
    }

    .btn-qr  { border-color: rgba(0,255,204,0.3); }
    .btn-pair { border-color: rgba(58,134,255,0.3); }

    .btn::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 14px;
      background: linear-gradient(45deg, #00ffc3, #3a86ff, #00ffc3);
      background-size: 300%;
      z-index: -1;
      opacity: 0;
      animation: borderAnim 4s linear infinite;
      transition: opacity 0.3s;
    }

    .btn:hover::before { opacity: 1; }

    @keyframes borderAnim {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 14px;
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
    }

    .icon { font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="logo">❄️ AKAZA-MD</div>
    <div class="tagline">WhatsApp Session Generator</div>

    <div class="button-container">
      <a href="/qr" class="btn btn-qr" target="_blank">
        <span class="icon">📷</span> QR Code
      </a>
      <a href="/pair" class="btn btn-pair" target="_blank">
        <span class="icon">🔑</span> Pairing Code
      </a>
      <a href="https://github.com/Dexmark256/akaza.pair256/fork" class="btn" target="_blank">
        <span class="icon">⭐</span> Fork Akaza-MD
      </a>
      <a href="https://whatsapp.com/channel/0029VbA6MSYJUM2TVOzCSb2A" class="btn" target="_blank">
        <span class="icon">💬</span> WhatsApp Channel
      </a>
    </div>
  </div>

  <footer>AKAZA-MD &copy; <span id="yr"></span> — All Rights Reserved</footer>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
  </script>
</body>
</html>
